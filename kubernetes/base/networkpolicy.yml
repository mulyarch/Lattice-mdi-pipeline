---
# Default deny all ingress/egress in mission namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: mission
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Allow mission-data-processor specific traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mission-processor
  namespace: mission
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mission-data-processor
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from within the namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mission
      ports:
        - protocol: TCP
          port: 8080
    # Allow Prometheus scraping from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow HTTPS to cloud services (S3, Azure Blob, KMS)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - [IP_ADDRESS]  # Block IMDS (use IRSA/Workload Identity instead)
      ports:
        - protocol: TCP
          port: 443
    # Allow cross-cloud VPN traffic
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8  # Internal VPN range
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 8080
